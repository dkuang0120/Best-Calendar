<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Best Calendar — simple calendar app" />
		<title>Best Calendar</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
			<h1>Best Calendar</h1>
			<div class="calendar-outline">
				<!-- month selector with arrows -->
				<div class="calendar-header">
					<span class="arrow prev">&#9664;</span>
					<span class="month-name">January</span>
					<span class="arrow next">&#9654;</span>
				</div>
				<!-- 7 columns x 5 rows = 35 day cells -->
				<div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div>
				<div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div>
				<div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div>
				<div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div>
				<div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div>
			</div>
		<script src="main.js" type="module"></script>
	</body>
</html>
</html>
