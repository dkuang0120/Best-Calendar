<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="styles.css">

<title>Best Calendar</title>
</head>

<body>

<div class="container">

<div class="left">

<div class="calendar">

<div class="month">
<i class="fa fa-angle-left prev"></i>
<div class="date">November 2026</div>
<i class="fa fa-angle-right next"></i>
</div>

<div class="weekdays">
<div>Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>
</div>

<div class="days">

<div class="prev-date">30</div>
<div class="prev-date">31</div>

<div>1</div>
<div>2</div>
<div>3</div>
<div>4</div>
<div>5</div>
<div>6</div>
<div>7</div>
<div>8</div>
<div>9</div>
<div>10</div>
<div>11</div>
<div>12</div>
<div>13</div>
<div>14</div>

<div class="today active">15</div>

<div>16</div>
<div>17</div>
<div>18</div>
<div>19</div>
<div>20</div>
<div>21</div>
<div>22</div>
<div>23</div>
<div>24</div>
<div>25</div>
<div>26</div>
<div>27</div>
<div>28</div>
<div>29</div>
<div>30</div>

<div class="next-date">1</div>
<div class="next-date">2</div>
<div class="next-date">3</div>

</div>
</div>
</div>

<div class="right">

<h3>Events</h3>

<div class="events"></div>

<button class="add-event-btn">
<i class="fas fa-plus"></i> Add Event
</button>

<div class="add-event-form" style="flex-direction:column;">
<span id="selected-date-label"></span>
<input type="text" id="event-title" placeholder="Event Title">
<input type="time" id="event-time">
<button id="save-event">Save Event</button>
</div>

</div>

</div>

<script src="main.js"></script>

</body>
</html>
</html>
